{% extends 'planner/base.html' %}

{% block title %}Password Updated | WeatherToDoList{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-copy glass-card">
        <p class="eyebrow">All set</p>
        <h1>Your password has been reset.</h1>
        <p>You can now sign in with your new password.</p>
    </div>
    <div class="auth-panel glass-card">
        <h2>Success</h2>
        <p class="auth-footnote"><a href="{% url 'login' %}">Log in to your account</a></p>
    </div>
</section>
{% endblock %}
